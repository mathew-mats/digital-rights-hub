<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Digital Rights Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #eef2f6;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 24px rgba(74,158,255,0.25);
        }
        .login-logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a2332;
            letter-spacing: -0.5px;
        }
        .login-logo p {
            font-size: 14px;
            color: #8a9bb5;
            margin-top: 2px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: #1a2332;
            display: block;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #eef2f6;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }
        .form-group input:focus {
            border-color: #4a9eff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(74,158,255,0.06);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a2332, #2a3a4e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(26,35,50,0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #8a9bb5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #4a9eff;
        }
        .back-link i {
            margin-right: 6px;
        }

        .toast-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .toast-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .toast-message i {
            font-size: 18px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0 8px;
            color: #8a9bb5;
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eef2f6;
        }

        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .login-logo h1 { font-size: 20px; }
        }

        /* ============================================
   REAL PHONE FIX - USE dvh
   ============================================ */
@media (max-width: 768px) {
    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;  /* Prevents bouncing on iOS Safari */
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        padding: 0;
    }
    
    .app-container {
        width: 100%;
        height: 100dvh;  /* <-- KEY: dynamic viewport height */
        max-height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    
    .main-content {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin-left: 0 !important;
        min-height: 0;  /* Prevents flex overflow */
    }
    
    /* Chat messages */
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px 16px 12px 16px;
        min-height: 0;  /* Important for flex */
        padding-bottom: 8px;
    }
    
    /* Quick questions */
    .quick-questions {
        flex-shrink: 0;
        padding: 6px 12px;
        background: #f8fafc;
        border-top: 1px solid #eef2f6;
        overflow-x: auto;
        white-space: nowrap;
        display: flex;
        gap: 6px;
        flex-wrap: nowrap;
    }
    
    /* Chat input */
    .chat-input {
        flex-shrink: 0;
        padding: 8px 12px 12px;
        background: white;
        border-top: 1px solid #eef2f6;
        width: 100%;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    
    /* Input wrapper */
    .chat-input .input-wrapper {
        display: flex;
        gap: 8px;
        align-items: center;
        background: #f0f4f9;
        border-radius: 10px;
        padding: 2px 2px 2px 12px;
    }
    
    .chat-input .input-wrapper input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 8px 0;
        font-size: 14px;
        outline: none;
        min-height: 40px;
    }
    
    .chat-input .input-wrapper .btn-send {
        padding: 6px 14px;
        font-size: 13px;
        border-radius: 8px;
        background: #1a2332;
        color: white;
        border: none;
        cursor: pointer;
        white-space: nowrap;
    }
    
    .chat-input .input-wrapper .btn-send span {
        display: none;
    }
    
    /* Hero banner small */
    .hero-banner {
        flex-shrink: 0;
        padding: 10px 14px;
        margin-bottom: 0;
    }
    .hero-content h1 {
        font-size: 16px;
    }
    .hero-content p {
        font-size: 12px;
        margin-bottom: 4px;
    }
    .hero-stats {
        gap: 8px;
        margin-bottom: 6px;
    }
    .hero-stats .stat .number {
        font-size: 14px;
    }
    .hero-stats .stat .label {
        font-size: 10px;
    }
    .hero-actions .btn-primary-hero,
    .hero-actions .btn-secondary-hero {
        padding: 4px 10px;
        font-size: 11px;
    }
    .hero-image {
        display: none;
    }
    
    /* Features grid */
    .features-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        flex-shrink: 0;
        padding: 4px 0;
    }
    .feature-card {
        padding: 6px 4px;
        border-radius: 8px;
    }
    .feature-card .feature-icon {
        width: 28px;
        height: 28px;
        font-size: 12px;
        margin: 0 auto 4px;
    }
    .feature-card .feature-title {
        font-size: 9px;
    }
    .feature-card .feature-desc {
        display: none;
    }
    
    /* Welcome message */
    .welcome-message .bubble {
        padding: 10px 14px;
    }
    .welcome-message .bubble .welcome-title {
        font-size: 15px;
    }
    .welcome-message .bubble .welcome-desc {
        font-size: 12px;
    }
    .welcome-message .bubble .topic-list li {
        font-size: 10px;
        padding: 2px 10px;
    }
    .welcome-message .bubble .suggestion {
        font-size: 11px;
    }
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="icon-wrap"><i class="fas fa-shield-alt"></i></div>
            <h1>Digital Rights Hub</h1>
            <p>Admin Access</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="toast-message toast-{{ message.tags }}">
                <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="form-group">
                <label><i class="fas fa-user" style="color:#4a9eff; margin-right:6px;"></i> Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:#4a9eff; margin-right:6px;"></i> Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="divider">or</div>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>
</html>
